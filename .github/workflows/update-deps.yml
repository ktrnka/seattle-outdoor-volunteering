name: Update Dependencies

on:
  schedule:
    - cron: '0 0 3 * *'  # Monthly on the 3rd at midnight UTC
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version-file: "pyproject.toml"

    - id: run-update
      name: Test, update, and test dependencies
      run: |
        scripts/update_deps.sh
        echo "update_report=$(cat /tmp/uv_upgrade_report.txt)" >> $GITHUB_OUTPUT

    - name: Open PR with updated dependencies
      uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: update dependencies"
        title: "chore: update dependencies"
        body: |
          Automated weekly dependency update.

          - Baseline tests passed before update
          - Tests passed after update

          ## Updated packages

          ```
          ${{ steps.run-update.outputs.update_report }}
          ```

          Review the `uv.lock` diff to see what changed.
        branch: chore/update-dependencies
        delete-branch: true
        labels: dependencies
